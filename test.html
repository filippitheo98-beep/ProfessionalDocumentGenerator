<!DOCTYPE html>
<html>
<head>
    <title>Test DUERP</title>
</head>
<body>
    <h1>Test DUERP Generator</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>
    
    <script>
        function testAPI() {
            fetch('/api/auth/user')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').innerHTML = 
                        '<p>✅ API fonctionne: ' + JSON.stringify(data) + '</p>';
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = 
                        '<p>❌ Erreur: ' + error + '</p>';
                });
        }
    </script>
</body>
</html>
